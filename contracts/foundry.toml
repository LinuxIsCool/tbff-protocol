[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.30"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
fuzz.runs = 256
invariant.runs = 512
invariant.depth = 50

[profile.deep-fuzz]
fuzz.runs = 10000

[profile.ci]
fuzz.runs = 1000

[profile.fork]
# Fork tests: FOUNDRY_PROFILE=fork forge test --match-path "test/integration/*"

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
